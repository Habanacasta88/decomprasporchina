# Redirect www to non-www
server {
    listen 80;
    server_name www.decomprasporchina.com;
    return 301 https://decomprasporchina.com$request_uri;
}

server {
    listen 80 default_server;
    server_name decomprasporchina.com _;
    root /usr/share/nginx/html;
    index index.html;

    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Cache static assets
    location ~* \.(jpg|jpeg|png|gif|webp|svg|ico|css|js|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # HTML pages - short cache
    location ~* \.html$ {
        expires 1h;
        add_header Cache-Control "public, must-revalidate";
    }

    # SPA fallback
    location / {
        try_files $uri $uri/index.html $uri.html /404.html =404;
    }

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;
    gzip_min_length 256;

    # WordPress redirects (old URLs that might have /wp-content/uploads/)
    location /wp-content/uploads/ {
        rewrite ^/wp-content/uploads/(.*)$ /images/$1 permanent;
    }

    # Redirect old WordPress category-prefixed URLs → clean post slugs
    # e.g. /tiendas-chinas/escoger-tu-talla-ropa-china/ → /escoger-tu-talla-ropa-china/
    # MUST use absolute URL with $scheme to avoid nginx defaulting to http://
    location ~* ^/(tiendas-chinas|accesorios|ropa|calzado|tecnologia|deporte|xiaomi|blog)/([^/]+)/?$ {
        return 301 https://decomprasporchina.com/$2/;
    }
}
